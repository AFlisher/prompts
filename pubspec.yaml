name: prombt_app
description: "Prombt - AI Photo Styles. Apply stunning AI-powered visual aesthetics to your photos."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ">=3.2.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  google_fonts: ^6.2.1
  image_picker: ^1.0.0
  path_provider: ^2.1.6
  gal: ^2.2.1
  supabase_flutter: ^2.15.4
  flutter_dotenv: ^6.0.1
  image: ^4.9.1
  http: ^1.2.0
  shared_preferences: ^2.2.0
  firebase_core: ^3.15.2
  google_sign_in: ^6.3.0
  cached_network_image: ^3.4.1
  shimmer: ^3.0.0
  flutter_secure_storage: ^10.3.1
  google_mobile_ads: ^9.0.0
  flutter_displaymode: ^0.7.0
  share_plus: ^13.2.1
dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  flutter_launcher_icons: ^0.14.4

# Launcher icon, generated from the in-app logo (see
# test/tools/render_app_icon.dart for how the source PNGs are produced).
# Regenerate with: dart run flutter_launcher_icons
flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/icon/app_icon.png"
  adaptive_icon_background: "#0A0A0A"
  adaptive_icon_foreground: "assets/icon/app_icon_foreground.png"
  remove_alpha_ios: true

flutter:
  uses-material-design: true

  assets:
    - .env
    - assets/images/